# Automatisches Backup der Supabase-Datenbank.
#
# Sichert die komplette Datenbank regelmäßig als .sql.gz-Datei und legt sie
# als GitHub-"Artifact" ab (90 Tage abrufbar unter dem Reiter "Actions").
#
# EINMALIG EINRICHTEN:
#   GitHub-Repo -> Settings -> Secrets and variables -> Actions -> New secret
#     Name:  BACKUP_DATABASE_URL
#     Wert:  die DIRECT_URL (Port 5432) aus Supabase, mit echtem Passwort
#
# Manuell auslösen: Reiter "Actions" -> "Datenbank-Backup" -> "Run workflow".

name: Datenbank-Backup

on:
  schedule:
    - cron: "0 3 * * 0" # jeden Sonntag um 03:00 UTC
  workflow_dispatch: {} # erlaubt manuelles Auslösen per Knopfdruck

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Zeitstempel erzeugen
        id: ts
        run: echo "stamp=$(date -u +%Y-%m-%d_%H%M)" >> "$GITHUB_OUTPUT"

      - name: Datenbank sichern (pg_dump via Postgres-17-Image)
        env:
          DB_URL: ${{ secrets.BACKUP_DATABASE_URL }}
        run: |
          if [ -z "$DB_URL" ]; then
            echo "::error::Secret BACKUP_DATABASE_URL ist nicht gesetzt. Siehe Kommentar oben in dieser Datei."
            exit 1
          fi
          docker run --rm postgres:17 \
            pg_dump "$DB_URL" --no-owner --no-privileges \
            | gzip > "backup_${{ steps.ts.outputs.stamp }}.sql.gz"
          echo "Backup-Größe:"; ls -lh backup_*.sql.gz

      - name: Backup als Artifact hochladen (90 Tage abrufbar)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.ts.outputs.stamp }}
          path: backup_*.sql.gz
          retention-days: 90
